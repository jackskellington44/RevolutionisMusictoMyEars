<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Revolution is Music to My Ears</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #panels {
      display: none;
      width: 100%;
      height: 100vh;
    }

    .panel {
      display: inline-block;
      width: 50%;
      height: 100%;
      vertical-align: top;
      position: relative;
      overflow: hidden;
    }

    .panel .gie-widget-container {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div id="panels">
  <div class="panel" id="panel-left"></div>
  <div class="panel" id="panel-right"></div>
</div>

<audio id="audio-player" preload="auto"></audio>

<!-- Getty's official widget script -->
<script src="https://embed-cdn.gettyimages.com/widgets.js" charset="utf-8" async></script>

<script>
(function () {
  'use strict';

  var config = null;
  var audioCtx = null;
  var analyser = null;
  var dataArray = null;
  var source = null;
  var audioEl = document.getElementById('audio-player');
  var panels = document.getElementById('panels');
  var panelLeft = document.getElementById('panel-left');
  var panelRight = document.getElementById('panel-right');

  var isStarted = false;
  var isPlaying = false;
  var leftTurn = true;
  var lastBeatTime = 0;
  var beatCooldown = 150;
  var trackIndex = 0;

  var lastLeftIndex = -1;
  var lastRightIndex = -1;

  // Make sure gie is available
  window.gie = window.gie || function (c) {
    (window.gie.q = window.gie.q || []).push(c);
  };

  // Load config.json
  fetch('config.json')
    .then(function (res) {
      if (!res.ok) throw new Error('Failed to load config.json: ' + res.status);
      return res.json();
    })
    .then(function (data) {
      config = data;
      console.log('Config loaded. ' + config.images.length + ' images available.');
    })
    .catch(function (err) {
      console.error('Could not load config.json:', err);
    });

  // Spacebar handler
  document.addEventListener('keydown', function (e) {
    if (e.code !== 'Space') return;
    e.preventDefault();

    if (!config) {
      console.error('Config not loaded yet.');
      return;
    }

    if (!isStarted) {
      startVisualizer();
    } else if (isPlaying) {
      pauseVisualizer();
    } else {
      resumeVisualizer();
    }
  });

  function getRandomIndex(exclude) {
    var len = config.images.length;
    if (len <= 1) return 0;
    var idx;
    do {
      idx = Math.floor(Math.random() * len);
    } while (idx === exclude);
    return idx;
  }

  function loadGettyWidget(panelEl, imageObj) {
    // Clear old content
    panelEl.innerHTML = '';

    // Create a unique container ID
    var containerId = 'gie-' + imageObj.id;
    var container = document.createElement('a');
    container.id = containerId;
    container.className = 'gie-single';
    container.href = 'https://www.gettyimages.com/detail/' + imageObj.items;
    container.target = '_blank';
    container.style.cssText = 'color:#a7a7a7;text-decoration:none;font-weight:normal !important;border:none;display:inline-block;width:100%;height:100%;';
    container.textContent = 'Embed from Getty Images';
    panelEl.appendChild(container);

    // Use Getty's widget loader
    gie(function () {
      gie.widgets.load({
        id: containerId,
        sig: imageObj.sig,
        w: '100%',
        h: '100%',
        items: imageObj.items,
        caption: false,
        tld: 'com',
        is360: false
      });
    });
  }

  function showInitialImages() {
    var leftIdx = getRandomIndex(-1);
    var rightIdx = getRandomIndex(leftIdx);
    lastLeftIndex = leftIdx;
    lastRightIndex = rightIdx;
    loadGettyWidget(panelLeft, config.images[leftIdx]);
    loadGettyWidget(panelRight, config.images[rightIdx]);
    panels.style.display = 'block';
  }

  function swapOnBeat() {
    if (leftTurn) {
      var newIdx = getRandomIndex(lastLeftIndex);
      lastLeftIndex = newIdx;
      loadGettyWidget(panelLeft, config.images[newIdx]);
    } else {
      var newIdx = getRandomIndex(lastRightIndex);
      lastRightIndex = newIdx;
      loadGettyWidget(panelRight, config.images[newIdx]);
    }
    leftTurn = !leftTurn;
  }

  function startVisualizer() {
    isStarted = true;

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    dataArray = new Uint8Array(analyser.frequencyBinCount);

    source = audioCtx.createMediaElementSource(audioEl);
    source.connect(analyser);
    analyser.connect(audioCtx.destination);

    audioEl.addEventListener('ended', nextTrack);
    loadTrack(0);

    showInitialImages();
    isPlaying = true;
    beatLoop();
  }

  function loadTrack(index) {
    trackIndex = index;
    var filename = config.playlist[trackIndex];
    if (!filename || filename.indexOf('..') !== -1 || filename.indexOf('/') !== -1) {
      console.error('Invalid playlist filename:', filename);
      return;
    }
    audioEl.src = 'audio/' + encodeURIComponent(filename);
    audioEl.play().catch(function (err) {
      console.error('Audio play error:', err);
    });
  }

  function nextTrack() {
    var next = (trackIndex + 1) % config.playlist.length;
    loadTrack(next);
  }

  function pauseVisualizer() {
    isPlaying = false;
    audioEl.pause();
  }

  function resumeVisualizer() {
    isPlaying = true;
    if (audioCtx && audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    audioEl.play().catch(function (err) {
      console.error('Audio resume error:', err);
    });
    beatLoop();
  }

  function beatLoop() {
    if (!isPlaying) return;
    requestAnimationFrame(beatLoop);

    analyser.getByteFrequencyData(dataArray);

    var sum = 0;
    for (var i = 0; i < dataArray.length; i++) {
      sum += dataArray[i];
    }
    var avg = sum / dataArray.length;

    var now = performance.now();
    var sensitivity = (config.settings && config.settings.beatSensitivity != null)
      ? config.settings.beatSensitivity
      : 0.65;

    if (avg > sensitivity * 255 && (now - lastBeatTime) > beatCooldown) {
      lastBeatTime = now;
      swapOnBeat();
    }
  }
})();
</script>

</body>
</html>
